name: Check for new UniFi releases

on:
  schedule:
    - cron: '0 20 * * *'  # daily at 12:00 PT (20:00 UTC, past Ubiquiti's release window)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse installed version
        id: installed
        run: |
          VERSION=$(grep -oP 'unifi/\K[0-9]+\.[0-9]+\.[0-9]+' unifi/Dockerfile | head -1)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Installed: ${VERSION}"

      - name: Check latest release from RSS
        id: latest
        run: |
          FEED_URL="https://community.ui.com/rss/releases/UniFi-Network-Controller/e6712595-81bb-4829-8e42-9e2630fabcfe"
          # Ubiquiti's server rejects curl's default UA, so spoof a browser UA.
          # Titles are wrapped in <![CDATA[...]]>, so match inside that.
          LATEST=$(curl -sL -A "Mozilla/5.0" "${FEED_URL}" \
            | grep -oP 'UniFi Network Application \K[0-9]+\.[0-9]+\.[0-9]+' \
            | head -1)
          if [ -z "${LATEST}" ]; then
            echo "Failed to parse RSS feed" >&2
            exit 1
          fi
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "Latest: ${LATEST}"

      - name: Verify download URL exists
        if: steps.latest.outputs.version != steps.installed.outputs.version
        run: |
          URL="https://dl.ui.com/unifi/${{ steps.latest.outputs.version }}/unifi_sysvinit_all.deb"
          CODE=$(curl -sI -o /dev/null -w "%{http_code}" "${URL}")
          if [ "${CODE}" != "200" ]; then
            echo "Download URL returned ${CODE}, not ready yet"
            exit 1
          fi

      - name: Open issue if new version available
        if: steps.latest.outputs.version != steps.installed.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT: ${{ steps.installed.outputs.version }}
          LATEST: ${{ steps.latest.outputs.version }}
        run: |
          # Deduplicate: skip if an open issue for this version already exists
          EXISTING=$(gh issue list --state open --label new-upstream-version \
            --search "${LATEST} in:title" --json number --jq 'length')
          if [ "${EXISTING}" -gt 0 ]; then
            echo "Issue already exists for ${LATEST}"
            exit 0
          fi

          gh label create new-upstream-version --color FBCA04 \
            --description "New UniFi release available" 2>/dev/null || true

          gh issue create \
            --title "New UniFi Network Application release: ${LATEST}" \
            --label new-upstream-version \
            --body "$(cat <<EOF
          A new UniFi Network Application release is available.

          - **Installed:** ${CURRENT}
          - **Latest:** ${LATEST}
          - **Release notes:** https://community.ui.com/releases/UniFi-Network-Application-${LATEST//./-}
          - **Download:** https://dl.ui.com/unifi/${LATEST}/unifi_sysvinit_all.deb

          Follow MAINTENANCE.md to build and deploy.
          EOF
          )"
